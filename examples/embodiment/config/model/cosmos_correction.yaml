model_type: "cosmos_correction"

# Wrapper interface (consumed by `rlinf.models.embodiment.cosmos_correction.get_model`)
token_dim: 768
action_dim: 6
num_action_chunks: 1
hidden_dim: 256
num_hidden_layers: 2
num_critics: 2
log_std_init: -1.0
learnable_log_std: False

precision: "32"

# Disabled: cosmos+correction is off-policy, neither a value nor a separate Q
# head are needed -- the wrapper bundles its own twin-Q critic.
add_value_head: False
add_q_head: False

# FSDP
sharding_strategy: no_shard
